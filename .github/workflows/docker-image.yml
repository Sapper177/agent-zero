name: Build and Push agent-zero Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-agent-zero-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./docker/base
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/agent-zero-base:latest

  build-agent-zero:
    needs: build-agent-zero-base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./docker/run
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/agent-zero:latest
